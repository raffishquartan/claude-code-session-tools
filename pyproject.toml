[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cc-session-tools"
version = "0.3.0"
description = "Claude Code session management CLI tools (ccd, ccr, ccs) and shared library"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "raffishquartan" }]
keywords = ["claude-code", "cli", "session-management"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
    "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/raffishquartan/claude-code-session-tools"
Repository = "https://github.com/raffishquartan/claude-code-session-tools"
Issues = "https://github.com/raffishquartan/claude-code-session-tools/issues"

[project.scripts]
ccd = "cc_session_tools.cli.ccd:main"
ccr = "cc_session_tools.cli.ccr:main"
ccs = "cc_session_tools.cli.ccs:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
