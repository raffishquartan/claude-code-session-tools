[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cc-session-tools"
version = "0.1.0"
description = "Claude Code session management CLI tools (ccd, ccr, ccs) and shared library"
requires-python = ">=3.10"

[project.scripts]
ccd = "cc_session_tools.cli.ccd:main"
ccr = "cc_session_tools.cli.ccr:main"
ccs = "cc_session_tools.cli.ccs:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
