name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev deps (non-editable)
        run: uv sync --no-editable --extra dev

      - name: Run tests
        run: uv run pytest -q

  install-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install via uv tool (non-editable, production path)
        run: uv tool install .

      - name: Add uv tool bin to PATH
        run: echo "$(uv tool dir --bin)" >> $GITHUB_PATH

      - name: Verify all CLIs report versions
        run: |
          ccd --version
          ccr --version
          ccs --version
          claude-code-usage --version
          ccst --version

  lint-no-personal-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Fail if /home/chris appears in tracked files
        run: "! git grep -rn '/home/chris'"
